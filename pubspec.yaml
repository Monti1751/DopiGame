name: dopi_game
description: "A Cozy gamified task manager Flutter application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  sqflite: ^2.3.0
  sqflite_common_ffi_web: ^0.4.5+1
  path: ^1.8.3
  google_fonts: ^8.0.2
  percent_indicator: ^4.2.3
  image_picker: ^1.0.7
  permission_handler: ^11.2.0
  shared_preferences: ^2.2.2
  confetti: ^0.7.0
  audioplayers: ^5.2.1
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/icon.png
    - assets/images/capybara_tea_party_background.png

